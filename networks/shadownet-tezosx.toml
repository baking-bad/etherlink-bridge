# Tezos shadownet (L1) <-> Tezos X EVM L2 (previewnet). Selected via NETWORK env var.
# L1 is the same shadownet as shadownet-etherlink; only the L2 (rollup + EVM node) differs.
name = "shadownet-tezosx"
default_token = "USDt"

[network]
l1_rpc_url = "https://rpc.tzkt.io/shadownet"
l2_rpc_url = "https://evm.previewnet.tezosx.nomadic-labs.com"
rollup_rpc_url = "https://previewnet-smart.tzkt.io/"
indexer_graphql_url = "https://tezosx-bridge-shadownet.dipdup.net/v1/graphql"
